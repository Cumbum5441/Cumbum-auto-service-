<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h2>🚖 Driver Login</h2>

<input type="text" id="mobile" placeholder="Mobile Number"><br><br>

<button onclick="loginDriver()" class="btn book">Login</button>

<p id="msg"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAUZdn6A3UVC6ZNJDVRI1v52dtmnKf8zn0",
  authDomain: "cumbum-auto-sarvice-7aff9.firebaseapp.com",
  databaseURL: "https://cumbum-auto-sarvice-7aff9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cumbum-auto-sarvice-7aff9",
  storageBucket: "cumbum-auto-sarvice-7aff9.firebasestorage.app",
  messagingSenderId: "986512805873",
  appId: "1:986512805873:web:f9671767539094a7857e50"
};

firebase.initializeApp(firebaseConfig);

function loginDriver() {
    let mobile = document.getElementById("mobile").value;

    firebase.database().ref("drivers").once("value", snapshot => {
        let drivers = snapshot.val();

        for (let id in drivers) {
            if (drivers[id].mobile == mobile && drivers[id].status == "Available") {
                localStorage.setItem("driverId", id);
                window.location = "driver-dashboard.html";
                return;
            }
        }

        document.getElementById("msg").innerHTML =
        "❌ Driver not approved or Mobile Number is incorrect.";
    });
}
</script>

</body>
</html>
<script src="driver-login.js"></script>

</body>
</html>
