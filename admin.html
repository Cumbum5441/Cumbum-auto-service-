<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kambham Ride - Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>👨‍💼 Kambham Ride Admin</h1>
<p>Manage Drivers & Bookings</p>
</header>

<div class="container">

<h2>Dashboard</h2>

<div class="card">
<h3>🚖 Driver Requests</h3>
<div id="driverRequests">
<p>No pending requests.</p>
</div>
</div>

<br>

<div class="card">
<h3>📋 Today's Bookings</h3>
<div id="bookingList">
<p>No bookings yet.</p>
</div>
</div>

<br>

<div class="card">
<h3>📊 Statistics</h3>

<p>👨‍✈️ Total Drivers:
<span id="totalDrivers">0</span></p>

<p>🟢 Available:
<span id="availableDrivers">0</span></p>

<p>🔴 Busy:
<span id="busyDrivers">0</span></p>

<p>📦 Total Bookings:
<span id="totalBookings">0</span></p>

</div>

</div>

</body>
</html>
