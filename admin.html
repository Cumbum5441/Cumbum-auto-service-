
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumbum Auto Admin Panel</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:20px;
}
h2{
    text-align:center;
    color:#ff9800;
}
table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}
th{
    background:#ff9800;
    color:#fff;
}
tr:nth-child(even){
    background:#f9f9f9;
}
</style>
</head>

<body>

<h2>🚖 Cumbum Auto Service - Admin Panel</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Pickup</th>
<th>Drop</th>
<th>Time</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAUZdn6A3UVC6ZNJDVRI1v52dtmnKf8zn0",
  authDomain: "cumbum-auto-sarvice-7aff9.firebaseapp.com",
  databaseURL: "https://cumbum-auto-sarvice-7aff9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cumbum-auto-sarvice-7aff9",
  storageBucket: "cumbum-auto-sarvice-7aff9.firebasestorage.app",
  messagingSenderId: "986512805873",
  appId: "1:986512805873:web:f9671767539094a7857e50"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const table = document.getElementById("bookingTable");

onValue(ref(db, "bookings"), (snapshot) => {
  table.innerHTML = "";

  snapshot.forEach((child) => {
    const data = child.val();

    table.innerHTML += `
      <tr>
        <td>${data.name || ""}</td>
        <td>${data.phone || ""}</td>
        <td>${data.pickup || ""}</td>
        <td>${data.drop || ""}</td>
        <td>${data.time || ""}</td>
      </tr>
    `;
  });
});
</script>

</body>
</html>
