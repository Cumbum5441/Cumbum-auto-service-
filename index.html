
<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumbum Auto Service</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:linear-gradient(90deg,#FFD600,#FF9800);
padding:20px;
text-align:center;
color:#000;
}

header h1{
font-size:30px;
}

header p{
margin-top:8px;
font-size:18px;
}

.container{
width:95%;
max-width:500px;
margin:auto;
padding:15px;
}

.hero img{
width:100%;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.card{
background:#fff;
padding:15px;
margin-top:15px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

.btn{
display:block;
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
color:white;
text-decoration:none;
text-align:center;
}

.book{
background:#ff9800;
}

.whatsapp{
background:#25D366;
}

.call{
background:#0d6efd;
}

.location{
background:#ff5722;
}
</style>
</head>

<body>

<header>
<h1>🚖 Cumbum Auto Service</h1>
<p>24×7 మీ సేవలో</p>
</header>

<div class="container">

<div class="hero">
<img src="auto.png" alt="Auto">
</div>

<div class="card">
<h2>🚖 Book Your Auto</h2>

<form onsubmit="sendBooking();return false;">

<input type="text" id="name" placeholder="👤 Your Name" required>

<input type="tel" id="phone" placeholder="📞 Mobile Number" required>

<input type="text" id="pickup" placeholder="📍 Pickup Location" required>

<input type="text" id="drop" placeholder="🏁 Drop Location" required>

<button class="btn book" type="submit">
🚖 Book Auto
</button>

</form>
</div><div class="card">

<h2>💰 Fare Calculator</h2>

<input type="number" id="km" placeholder="దూరం (KM) నమోదు చేయండి">

<button class="btn book" onclick="calculateFare()">
💰 Calculate Fare

 <button class="btn location" onclick="getLocation()">
📍 నా లొకేషన్ తీసుకో
 </button>
<h3 id="result" style="margin-top:15px;color:#e53935;"></h3>

</div>

<div class="card">

<h2>📍 మా సేవలు</h2>

<p>✅ కంభం</p>
<p>✅ అర్ధవీడు</p>
<p>✅ మార్కాపురం</p>
<p>✅ బెస్తవారిపేట</p>

</div>

<a class="btn whatsapp" href="https://wa.me/917989202444">
💬 WhatsApp Booking
</a>

<a class="btn call" href="tel:+917989202444">
📞 Call Now
</a>

<a class="btn location"
href="https://maps.app.goo.gl/3hwot1Hh5zUdTYtk9?g_st=ac"
target="_blank">
📍 View Location
</a>

<br><br>
<script>

function sendBooking(){

var name=document.getElementById("name").value;
var phone=document.getElementById("phone").value;
var pickup=document.getElementById("pickup").value;
var drop=document.getElementById("drop").value;

var msg=
"🚖 *New Auto Booking*%0A%0A"+
"👤 Name: "+name+"%0A"+
"📞 Phone: "+phone+"%0A"+
"📍 Pickup: "+pickup+"%0A"+
"🏁 Drop: "+drop;

alert("✅ మీ బుకింగ్ విజయవంతంగా నమోదైంది!");

window.open("https://wa.me/917989202444?text="+msg,"_blank");

}

function calculateFare(){

var km=document.getElementById("km").value;

if(km==""){
document.getElementById("result").innerHTML="⚠️ దయచేసి KM నమోదు చేయండి";
return;
}

var totalKm=km*2;
var fare=totalKm*10;

document.getElementById("result").innerHTML=
"🚖 మొత్తం దూరం (Up & Down): "+totalKm+" KM<br><br>💰 సుమారు ఛార్జీ: ₹"+fare;

}
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {

      var lat = position.coords.latitude;
      var lng = position.coords.longitude;

      window.open(
        "https://www.google.com/maps?q=" + lat + "," + lng,
        "_blank"
      );

    }, function() {
      alert("లోకేషన్ అనుమతి ఇవ్వండి.");
    });

  } else {
    alert("మీ బ్రౌజర్ GPS సపోర్ట్ చేయదు.");
  }
}
</script>


</div>

</body>
</html>
